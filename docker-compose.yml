services:
  app:
    build:
      context: .
      network: host
    expose:
      - "8080"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - /home/alex/.openclaw/workspace/radai:/radai:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
